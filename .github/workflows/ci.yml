name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]

env:
  BUILDER_IMAGE: ghcr.io/${{ github.repository }}/treestamps-builder
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Lint, Test, and Build
  # ---------------------------------------------------------------------------
  test:
    name: Lint, Test & Build
    runs-on: ubuntu-24.04
    if: |
      github.ref_name == 'main' && github.event_name == 'push' ||
      github.base_ref == 'main' ||
      (github.base_ref == 'develop' && github.head_ref == 'pre-release')
    permissions:
      contents: read
      packages: write
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Only fetch full history for the main push gate
          fetch-depth: ${{ (github.ref_name == 'main' && github.event_name == 'push') && 0 || 1 }}

      - name: Check for Redundant Tests
        id: gate
        if: github.ref_name == 'main' && github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SOURCE_BRANCH=$(gh pr list --state merged --limit 1 --json headRefName --template '{{range .}}{{.headRefName}}{{end}}')
          if [ -n "$SOURCE_BRANCH" ]; then
            git fetch origin "$SOURCE_BRANCH" --depth=1
            if git diff --quiet HEAD "origin/$SOURCE_BRANCH"; then
              echo "identical=true" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and cache the builder image in the registry
      - name: Build builder image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: treestamps-ci:ci
          cache-from: type=registry,ref=${{ env.BUILDER_IMAGE }}:cache
          cache-to: type=registry,ref=${{ env.BUILDER_IMAGE }}:cache,mode=max

      - name: Start Services
        run: |
          mkdir -p dist test-results
          docker compose up -d ci

      - name: Lint
        if: steps.gate.outputs.identical != 'true'
        run: docker exec treestamps-ci make lint

      - name: Tests
        id: run-tests
        if: steps.gate.outputs.identical != 'true'
        run: docker exec treestamps-ci make test

      - name: Build Distribution
        run: docker exec treestamps-ci make build

      - name: Upload Test Results
        if: "!cancelled() && steps.run-tests.outcome != 'skipped'"
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: test-results/pytest/

      - name: Publish Test Report
        if: "!cancelled() && steps.upload-tests.outcome == 'success'"
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: "**/test-results/pytest/*.xml"

      - name: Upload dist artifact
        if: "!cancelled() && steps.tests.outcome != 'skipped'"
        uses: actions/upload-artifact@v7
        with:
          name: python-dist
          path: dist/
          retention-days: 2

      - name: Stop Services
        run: docker compose down

  # ---------------------------------------------------------------------------
  # Deploy to PyPI
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy
    needs: test
    if: github.event_name == 'push' ||
      (github.base_ref == 'develop' && github.head_ref == 'pre-release')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download dist artifact
        uses: actions/download-artifact@v8
        with:
          name: python-dist
          path: dist/

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Publish to PyPI
        run: uv publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
